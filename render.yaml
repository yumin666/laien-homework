services:
  - type: web
    name: laien-homework
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: MAX_REVIEW_PAGES
        value: 5
